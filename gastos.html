<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>El Profeta - Control de Gastos</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    /* Layout específico para Gastos */
    .full-width-section { width: 100%; margin-bottom: 20px; }
    
    .fin-summary {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      width: 100%;
    }
    
    .card-fin {
      background: white;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.05);
      border-left: 4px solid #ef4444;
    }
    .card-fin.pe { border-left-color: #f59e0b; }
    
    .big-number { font-size: 28px; font-weight: bold; margin: 8px 0; }
    
    .historial-list { max-height: 300px; overflow-y: auto; }
    .historial-item {
      display: flex; justify-content: space-between; align-items: center;
      padding: 12px 0; border-bottom: 1px solid #eee;
    }
    
    .form-row {
      display: grid; grid-template-columns: 1fr 1fr 2fr auto;
      gap: 15px; align-items: end; margin-top: 15px;
    }
    
    .btn-delete {
      background: #ef4444; color: white; padding: 6px 12px;
      font-size: 0.85em; border-radius: 6px; cursor: pointer; border: none;
    }
    
    @media (max-width: 768px) {
      .fin-summary, .form-row { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="app-container">
    <header style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
      <div>
        <h1><img src="EP CARA.png" alt="El Profeta" style="height:1em; vertical-align:middle;"> El Profeta</h1>
        <p style="color:#666; margin-top:4px;">Control de Gastos</p>
      </div>
      <a href="index.html" style="background:#7c3aed; color:white; padding:10px 20px; border-radius:8px; text-decoration:none; font-weight:bold;">📊 VENTAS</a>
    </header>

    <!-- TOTAL GASTADO & PUNTO DE EQUILIBRIO (Ancho completo) -->
    <div class="fin-summary full-width-section">
      <div class="card-fin">
        <h2 style="margin:0 0 5px 0; font-size:18px;">💸 Total Gastado</h2>
        <div class="big-number" id="total-gastado" style="color:#ef4444;">$0</div>
        <small id="cantidad-gastos" style="color:#666;">0 gastos registrados</small>
      </div>
      <div class="card-fin pe">
        <h2 style="margin:0 0 5px 0; font-size:18px;">⚖️ Punto de Equilibrio</h2>
        <p style="font-size:0.85em; color:#666; margin:4px 0;">(Para El Profeta − Total Gastado)</p>
        <div class="big-number" id="punto-equilibrio" style="color:#f59e0b;">$0</div>
      </div>
    </div>

    <!-- 4 Cards Financieras (Compactas) -->
    <section id="finanzas-container" class="full-width-section" style="display:grid; grid-template-columns:repeat(4,1fr); gap:15px;"></section>

    <!-- HISTORIAL -->
    <div class="card full-width-section">
      <h2>📋 Historial de Gastos</h2>
      <div id="historial-gastos" class="historial-list">
        <p style="color:#666; text-align:center; padding:20px;">Cargando datos...</p>
      </div>
    </div>

    <!-- FORMULARIO -->
    <div class="card full-width-section">
      <h2>➕ Agregar Nuevo Gasto</h2>
      <div class="form-row">
        <div>
          <label style="display:block; margin-bottom:5px; font-weight:600; font-size:0.9em;">ITEM</label>
          <input type="text" id="gasto-item" placeholder="Ej: Luz, Gas, Insumos...">
        </div>
        <div>
          <label style="display:block; margin-bottom:5px; font-weight:600; font-size:0.9em;">TOTAL ($)</label>
          <input type="number" id="gasto-monto" placeholder="0" min="0">
        </div>
        <div>
          <label style="display:block; margin-bottom:5px; font-weight:600; font-size:0.9em;">OBSERVACIÓN</label>
          <input type="text" id="gasto-obs" placeholder="Detalle opcional...">
        </div>
        <button id="btn-agregar-gasto" style="background:#10b981; color:white; padding:10px; border-radius:8px; font-weight:bold; cursor:pointer; border:none; height:40px;">✅ Guardar</button>
      </div>
    </div>
  </div>

  <script src="gastos.js"></script>
</body>
</html>

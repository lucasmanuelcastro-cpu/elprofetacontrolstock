<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>El Profeta - Control de Gastos</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    /* Estilos específicos aprobados para Gastos */
    :root {
      --bg-primary: #ffffff;
      --bg-secondary: #f9fafb;
      --bg-tertiary: #f3f4f6;
      --text-primary: #111827;
      --text-secondary: #6b7280;
      --border: rgba(0,0,0,0.1);
      --border-md: rgba(0,0,0,0.18);
      --radius-md: 8px;
      --radius-lg: 12px;
      --purple: #7c3aed;
      --purple-light: #ede9fe;
      --green: #10b981;
      --green-light: #d1fae5;
      --red: #ef4444;
      --red-light: #fee2e2;
      --blue: #3b82f6;
      --blue-light: #dbeafe;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg-primary: #1f2937;
        --bg-secondary: #111827;
        --bg-tertiary: #0f172a;
        --text-primary: #f9fafb;
        --text-secondary: #9ca3af;
        --border: rgba(255,255,255,0.1);
        --border-md: rgba(255,255,255,0.18);
        --purple-light: #2e1065;
        --green-light: #064e3b;
        --red-light: #7f1d1d;
        --blue-light: #1e3a5f;
      }
    }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; background: var(--bg-tertiary); color: var(--text-primary); min-height: 100vh; margin: 0; }
    .app { max-width: 960px; margin: 0 auto; padding: 1.5rem; }
    .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; }
    .header-brand h1 { font-size: 20px; font-weight: 600; color: var(--text-primary); display: flex; align-items: center; gap: 8px; margin: 0; }
    .header-brand h1 img { height: 1.3em; vertical-align: middle; }
    .header-brand p { font-size: 12px; color: var(--text-secondary); margin-top: 3px; }
    .btn-ventas { background: var(--purple); color: white; padding: 8px 18px; border-radius: var(--radius-md); font-size: 13px; font-weight: 600; border: none; cursor: pointer; text-decoration: none; display: inline-flex; align-items: center; gap: 6px; transition: opacity 0.15s; }
    .btn-ventas:hover { opacity: 0.88; }
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px; }
    .grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 16px; }
    .card { background: var(--bg-primary); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 1rem 1.25rem; margin-bottom: 16px; }
    .card-accent-red { border-left: 3px solid var(--red); border-radius: 0 var(--radius-lg) var(--radius-lg) 0; }
    .card-accent-purple { border-left: 3px solid var(--purple); border-radius: 0 var(--radius-lg) var(--radius-lg) 0; }
    .card-accent-green { border-left: 3px solid var(--green); border-radius: 0 var(--radius-lg) var(--radius-lg) 0; }
    .card-label { font-size: 11px; font-weight: 500; color: var(--text-secondary); letter-spacing: 0.04em; text-transform: uppercase; margin-bottom: 6px; }
    .card-value { font-size: 22px; font-weight: 600; color: var(--text-primary); margin: 5px 0; }
    .card-sub { font-size: 11px; color: var(--text-secondary); margin-top: 4px; }
    .card-title { font-size: 13px; font-weight: 600; color: var(--text-primary); display: flex; align-items: center; gap: 6px; }
    .val-red { color: var(--red) !important; }
    .val-green { color: var(--green) !important; }
    .val-blue { color: var(--blue) !important; }
    .val-purple { color: var(--purple) !important; }
    /* Ocultar Popularidad y Historial Global de ui.js */
    #stock-general-section > div > div:nth-child(2) { display: none !important; }
    #stock-general-section > div { grid-template-columns: 1fr !important; }
    #ventas-general-section > div:last-child { display: none !important; }
    .historial-empty { color: var(--text-secondary); font-size: 13px; text-align: center; padding: 28px; }
    .historial-list { max-height: 260px; overflow-y: auto; }
    .historial-item { display: flex; align-items: center; gap: 12px; padding: 9px 0; border-bottom: 0.5px solid var(--border); font-size: 13px; }
    .historial-item:last-child { border-bottom: none; }
    .h-item-name { flex: 1; color: var(--text-primary); font-weight: 600; }
    .h-item-monto { color: var(--red); font-weight: 700; min-width: 90px; text-align: right; }
    .h-item-obs { color: var(--text-secondary); flex: 2; font-size: 12px; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr 2fr auto; gap: 10px; align-items: end; margin-top: 14px; }
    .form-group label { display: block; font-size: 11px; color: var(--text-secondary); font-weight: 600; margin-bottom: 5px; letter-spacing: 0.04em; text-transform: uppercase; }
    .form-group input { width: 100%; padding: 8px 10px; font-size: 13px; border: 0.5px solid var(--border-md); border-radius: var(--radius-md); background: var(--bg-secondary); color: var(--text-primary); outline: none; }
    .form-group input:focus { border-color: var(--purple); box-shadow: 0 0 0 2px rgba(124,58,237,0.15); }
    .btn-add { background: var(--green); color: white; border: none; border-radius: var(--radius-md); padding: 9px 16px; font-size: 13px; font-weight: 600; cursor: pointer; display: inline-flex; align-items: center; gap: 5px; height: 36px; transition: opacity 0.15s; }
    .btn-add:hover { opacity: 0.88; }
    .total-row { display: flex; justify-content: flex-end; align-items: center; gap: 10px; margin-top: 12px; padding-top: 10px; border-top: 0.5px solid var(--border); font-size: 13px; color: var(--text-secondary); }
    .total-row strong { font-size: 16px; font-weight: 700; color: var(--red); }
    @media (max-width: 700px) { .grid-2 { grid-template-columns: 1fr; } .grid-4 { grid-template-columns: 1fr 1fr; } .form-row { grid-template-columns: 1fr 1fr; } .form-row .btn-add { grid-column: span 2; justify-content: center; } }
    @media (max-width: 420px) { .grid-4 { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="header-brand">
      <h1><img src="EP CARA.png" alt="El Profeta" onerror="this.style.display='none'"> El Profeta</h1>
      <p>Control de Gastos</p>
    </div>
    <a href="index.html" class="btn-ventas"> Ventas</a>
  </div>

  <div class="grid-2">
    <!-- Stock General (renderizado por ui.js) -->
    <section id="stock-general-section" class="card-section"></section>
    
    <!-- Totales de Gastos -->
    <div style="display:flex; flex-direction:column; gap:16px;">
      <div class="card card-accent-red">
        <div class="card-label">💸 Total gastado</div>
        <div class="card-value val-red" id="total-gastado-display">$0</div>
        <div class="card-sub" id="total-gastado-items">0 gastos registrados</div>
      </div>
      <div class="card card-accent-purple">
        <div class="card-label">⚖️ Punto de equilibrio</div>
        <div class="card-value" id="punto-equilibrio" style="font-size:18px; color:var(--text-secondary);">—</div>
        <div class="card-sub">(Para El Profeta − Total gastado)</div>
      </div>
    </div>
  </div>

  <!-- Dinero Ingresado (renderizado por ui.js) -->
  <section id="ventas-general-section" class="card-section"></section>

  <!-- Historial de Gastos -->
  <div class="card card-accent-purple">
    <div class="card-title" style="margin-bottom:12px;">📋 Historial de gastos</div>
    <div id="historial-gastos-container">
      <div class="historial-empty">Cargando desde la nube...</div>
    </div>
    <div class="total-row" id="total-row" style="display:none;">
      <span>Total gastado:</span>
      <strong id="total-row-valor">$0</strong>
    </div>
  </div>

  <!-- Formulario -->
  <div class="card card-accent-green">
    <div class="card-title">➕ Agregar nuevo gasto</div>
    <div class="form-row">
      <div class="form-group"><label>Item</label><input type="text" id="gasto-item" placeholder="Ej: Insumos, Luz, Gas..."></div>
      <div class="form-group"><label>Total ($)</label><input type="number" id="gasto-monto" placeholder="0" min="0" step="0.01"></div>
      <div class="form-group"><label>Observación</label><input type="text" id="gasto-obs" placeholder="Detalle del gasto..."></div>
      <button class="btn-add" id="btn-agregar-gasto">✅ Agregar</button>
    </div>
  </div>
</div>

<script>
  // ⚠️ REEMPLAZÁ ESTO CON TU URL DE GOOGLE APPS SCRIPT
  const URL_SCRIPT = "https://script.google.com/macros/s/TU_ID_AQUI/exec";

  var gastos = [];

  function fmt(n) { return (isNaN(n) || n === null) ? '—' : Math.round(n).toLocaleString('es-AR'); }
  function fmtPesos(n) { return '$' + fmt(n); }

  // 1. CARGAR DESDE SHEET
  function cargarGastos() {
    const container = document.getElementById('historial-gastos-container');
    fetch(URL_SCRIPT + "?accion=leerGastos")
      .then(res => res.json())
      .then(data => {
        gastos = data.gastos || [];
        renderHistorial();
        updateTotales();
      })
      .catch(() => container.innerHTML = '<div class="historial-empty">Error al conectar con la BD</div>');
  }

  // 2. GUARDAR EN SHEET
  document.getElementById('btn-agregar-gasto').addEventListener('click', function() {
    const item = document.getElementById('gasto-item').value.trim();
    const monto = parseFloat(document.getElementById('gasto-monto').value);
    const obs = document.getElementById('gasto-obs').value.trim();
    const btn = this;

    if (!item || !monto || monto <= 0) { alert("Completá Item y Monto correctamente."); return; }

    btn.textContent = "⏳ Guardando..."; btn.disabled = true;
    fetch(URL_SCRIPT, {
      method: "POST",
      body: JSON.stringify({ accion: "guardarGasto", gasto: { item, monto, obs, fecha: new Date().toISOString() } })
    })
    .then(res => res.text())
    .then(resp => {
      if (resp === "OK_GASTO") {
        document.getElementById('gasto-item').value = '';
        document.getElementById('gasto-monto').value = '';
        document.getElementById('gasto-obs').value = '';
        cargarGastos();
      } else alert("Error al guardar");
    })
    .catch(() => alert("Error de conexión"))
    .finally(() => { btn.textContent = "✅ Agregar"; btn.disabled = false; });
  });

  // 3. ELIMINAR GASTO (NUEVO)
  function eliminarGasto(idFila) {
    if (!confirm("¿Estás seguro de eliminar este gasto? Esta acción no se puede deshacer.")) return;

    fetch(URL_SCRIPT, {
      method: "POST",
      headers: { "Content-Type": "text/plain" },
      body: JSON.stringify({ accion: "borrarGasto", idFila: idFila })
    })
    .then(res => res.text())
    .then(resp => {
      if (resp === "OK_BORRADO") {
        gastos = gastos.filter(g => g.idFila !== idFila);
        renderHistorial();
        updateTotales();
      } else {
        alert("❌ Error al borrar: " + resp);
      }
    })
    .catch(err => {
      console.error(err);
      alert("❌ Error de conexión al borrar.");
    });
  }

  // 4. RENDERIZAR Y CALCULAR
  function renderHistorial() {
    const c = document.getElementById('historial-gastos-container');
    const totalRow = document.getElementById('total-row');
    if (gastos.length === 0) {
      c.innerHTML = '<div class="historial-empty">No hay gastos registrados</div>';
      totalRow.style.display = 'none'; return;
    }
    let html = '<div class="historial-list">';
    let totalSum = 0;
    gastos.forEach(g => {
      totalSum += g.monto;
      // AGREGADO: Botón de borrar con el evento onclick pasandole el idFila
      html += `
        <div class="historial-item">
          <span class="h-item-name">${g.item}</span>
          <span class="h-item-monto">−${fmtPesos(g.monto)}</span>
          <span class="h-item-obs">${g.obs || '—'}</span>
          <small style="color:#6b7280; font-size:11px;">${g.fecha || ''}</small>
          <button onclick="eliminarGasto(${g.idFila})" 
                  style="background:none; border:none; cursor:pointer; font-size:16px; margin-left:10px; color:#ef4444;" 
                  title="Borrar gasto">🗑️</button>
        </div>`;
    });
    c.innerHTML = html + '</div>';
    totalRow.style.display = 'flex';
    document.getElementById('total-row-valor').textContent = fmtPesos(totalSum);
  }

  function updateTotales() {
    const total = gastos.reduce((s, g) => s + g.monto, 0);
    document.getElementById('total-gastado-display').textContent = fmtPesos(total);
    document.getElementById('total-gastado-items').textContent = gastos.length + (gastos.length === 1 ? ' gasto' : ' gastos');
    document.getElementById('total-row-valor').textContent = fmtPesos(total);
    calcularEquilibrio(total);
  }

  function calcularEquilibrio(totalGastado) {
    const eqEl = document.getElementById('punto-equilibrio');
    const profetaEl = document.querySelector('#ventas-general-section .card:last-child .big-number');
    if (profetaEl) {
      const val = parseFloat(profetaEl.textContent.replace('$', '').replace(/\./g, '').replace(',', '.')) || 0;
      if (val > 0) {
        const eq = val - totalGastado;
        eqEl.textContent = (eq >= 0 ? '+' : '') + fmtPesos(eq);
        eqEl.style.color = eq >= 0 ? 'var(--green)' : 'var(--red)';
      }
    } else {
      setTimeout(() => calcularEquilibrio(totalGastado), 1200);
    }
  }

  document.addEventListener('DOMContentLoaded', cargarGastos);
</script>

<script src="logic.js"></script>
<script src="ui.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>El Profeta - Control de Gastos</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app-container">
        
        <!-- HEADER CON BOTÓN VENTAS -->
        <header class="main-header" style="display:flex; justify-content:space-between; align-items:center; margin-bottom:24px;">
            <div>
                <h1>🍺 El Profeta</h1>
                <p style="color:#6b7280; font-size:0.9em;">Control de Gastos</p>
            </div>
            <div style="display:flex; gap:12px; align-items:center;">
                <a href="index.html" style="background:#7c3aed; color:white; padding:10px 20px; border-radius:12px; text-decoration:none; font-weight:600;">📊 VENTAS</a>
            </div>
        </header>

        <!-- STOCK GENERAL (igual que en index.html) -->
        <section id="stock-general-section" class="card-section"></section>

        <!-- DINERO INGRESADO (igual que index.html) -->
        <section id="ventas-general-section" class="card-section"></section>

        <!-- RESUMEN DE GASTOS -->
        <div class="card" style="border-left:4px solid #ef4444; margin-top:20px;">
            <h2>💰 Resumen de Gastos</h2>
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:20px; margin-top:15px;">
                <div style="background:#fef2f2; padding:15px; border-radius:12px;">
                    <p style="color:#6b7280; font-size:0.9em; margin:0;">Total Gastado</p>
                    <p class="big-number" style="color:#ef4444; margin:8px 0;">$<span id="total-gastado">0</span></p>
                </div>
                <div style="background:#fef3c7; padding:15px; border-radius:12px;">
                    <p style="color:#6b7280; font-size:0.9em; margin:0;">Cantidad de Gastos</p>
                    <p class="big-number" style="color:#f59e0b; margin:8px 0;"><span id="cantidad-gastos">0</span></p>
                </div>
            </div>
        </div>

        <!-- AGREGAR GASTO -->
        <div class="card" style="border-left:4px solid #10b981; margin-top:20px;">
            <h2>➕ Agregar Nuevo Gasto</h2>
            <div style="display:grid; grid-template-columns:1fr 1fr 2fr auto; gap:12px; align-items:end; margin-top:15px;">
                <div>
                    <label style="display:block; margin-bottom:6px; font-size:0.9em; color:#374151; font-weight:600;">ITEM</label>
                    <input type="text" id="gasto-item" placeholder="Ej: Insumos, Luz, Gas..." style="width:100%; padding:10px;">
                </div>
                <div>
                    <label style="display:block; margin-bottom:6px; font-size:0.9em; color:#374151; font-weight:600;">Total ($)</label>
                    <input type="number" id="gasto-monto" placeholder="0" min="0" step="0.01" style="width:100%; padding:10px;">
                </div>
                <div>
                    <label style="display:block; margin-bottom:6px; font-size:0.9em; color:#374151; font-weight:600;">OBSERVACIÓN</label>
                    <input type="text" id="gasto-obs" placeholder="Detalle del gasto, fecha, proveedor..." style="width:100%; padding:10px;">
                </div>
                <button id="btn-agregar-gasto" style="background:#10b981; padding:10px 20px; font-weight:600;">✅ Agregar</button>
            </div>
        </div>

        <!-- HISTORIAL DE GASTOS -->
        <div class="card" style="border-left:4px solid #7c3aed; margin-top:20px;">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
                <h2 style="margin:0;">📋 Historial DE GASTOS</h2>
                <button onclick="exportarGastosCSV()" style="background:#059669; padding:8px 16px; font-size:0.85em;">📥 Exportar CSV</button>
            </div>
            <div id="historial-gastos-lista" style="max-height:400px; overflow-y:auto;">
                <p style="color:#6b7280; text-align:center; padding:20px;">No hay gastos registrados</p>
            </div>
        </div>

    </div>

    <script src="logic.js"></script>
    <script src="ui.js"></script>
    <script src="gastos.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>El Profeta - Control de Gastos</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    /* Layout específico para esta página */
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
    .grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin-bottom: 20px; }
    .card-accent-red { border-left: 4px solid #ef4444; }
    .card-accent-purple { border-left: 4px solid #7c3aed; }
    .card-accent-green { border-left: 4px solid #10b981; }
    .big-number { font-size: 24px; font-weight: bold; margin: 8px 0; }
    .historial-list { max-height: 300px; overflow-y: auto; }
    .historial-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid #eee; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr 2fr auto; gap: 10px; align-items: end; margin-top: 15px; }
    .btn-delete { background: #ef4444; padding: 5px 10px; font-size: 0.8em; border-radius: 6px; }
    .loading { color: #666; font-style: italic; text-align: center; padding: 20px; }
    @media (max-width: 768px) { .grid-2, .grid-4, .form-row { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <div class="app-container">
    <header style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
      <div>
        <h1><img src="EP CARA.png" alt="El Profeta" style="height:1em; vertical-align:middle;"> El Profeta</h1>
        <p style="color:#666; margin-top:4px;">Control de Gastos</p>
      </div>
      <a href="index.html" style="background:#7c3aed; color:white; padding:10px 20px; border-radius:8px; text-decoration:none; font-weight:bold;">📊 VENTAS</a>
    </header>

    <div class="grid-2">
  
      <div style="display:flex; flex-direction:column; gap:20px;">
        <div class="card card-accent-red">
          <h2>💸 Total Gastado</h2>
          <div class="big-number" id="total-gastado">$0</div>
          <small id="cantidad-gastos">0 gastos registrados</small>
        </div>
        <div class="card card-accent-purple">
          <h2>⚖️ Punto de Equilibrio</h2>
          <p style="font-size:0.85em; color:#666; margin:4px 0;">(Para El Profeta − Total Gastado)</p>
          <div class="big-number" id="punto-equilibrio">$0</div>
        </div>
      </div>
    </div>

    <section id="finanzas-container" class="grid-4"></section>

    <div class="card card-accent-green" style="margin-bottom:20px;">
      <h2>📋 Historial de Gastos</h2>
      <div id="historial-gastos" class="historial-list">
        <p class="loading">Cargando datos...</p>
      </div>
    </div>

    <div class="card">
      <h2>➕ Agregar Nuevo Gasto</h2>
      <div class="form-row">
        <div>
          <label style="display:block; margin-bottom:5px; font-size:0.9em; font-weight:600;">ITEM</label>
          <input type="text" id="gasto-item" placeholder="Ej: Luz, Gas, Insumos...">
        </div>
        <div>
          <label style="display:block; margin-bottom:5px; font-size:0.9em; font-weight:600;">TOTAL ($)</label>
          <input type="number" id="gasto-monto" placeholder="0" min="0">
        </div>
        <div>
          <label style="display:block; margin-bottom:5px; font-size:0.9em; font-weight:600;">OBSERVACIÓN</label>
          <input type="text" id="gasto-obs" placeholder="Detalle opcional...">
        </div>
        <button id="btn-agregar-gasto" style="background:#10b981; padding:10px; border-radius:8px; font-weight:bold; cursor:pointer;">✅ Guardar</button>
      </div>
    </div>
  </div>

  <script src="gastos.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>El Profeta - Control de Gastos</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app-container">
        
        <!-- HEADER CON BOTÓN VENTAS -->
        <header style="display:flex; justify-content:space-between; align-items:center; margin-bottom:24px;">
            <div>
                <h1 style="display:flex; align-items:center; gap:10px; margin:0;">
                    <img src="EP CARA.png" alt="El Profeta" style="height:1.2em; vertical-align:middle;">
                    El Profeta
                </h1>
                <p style="color:#6b7280; font-size:0.9em; margin:4px 0 0 0;">Control de Gastos</p>
            </div>
            <a href="index.html" style="background:#7c3aed; color:white; padding:10px 20px; border-radius:12px; text-decoration:none; font-weight:600;">📊 VENTAS</a>
        </header>

        <!-- STOCK GENERAL -->
        <section id="stock-general-section" class="card-section"></section>

        <!-- TOTAL GASTADO Y PUNTO DE EQUILIBRIO -->
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:20px;">
            <div class="card">
                <h2>TOTAL GASTADO</h2>
                <p class="big-number" style="color:#ef4444;">$<span id="total-gastado">0</span></p>
            </div>
            <div class="card">
                <h2>PUNTO DE EQUILIBRIO</h2>
                <p style="color:#6b7280; font-size:0.95em;">(PARA EL PROFETA - TOTAL GASTADO)</p>
            </div>
        </div>

        <!-- DINERO INGRESADO -->
        <section id="ventas-general-section" class="card-section"></section>

        <!-- HISTORIAL DE GASTOS -->
        <div class="card" style="border-left:4px solid #7c3aed;">
            <h2>📋 Historial DE GASTOS</h2>
            <div id="historial-gastos-lista" style="max-height:300px; overflow-y:auto; margin-top:15px;">
                <p style="color:#6b7280; text-align:center; padding:20px;">No hay gastos registrados</p>
            </div>
        </div>

        <!-- FORMULARIO AGREGAR GASTO -->
        <div class="card" style="border-left:4px solid #10b981;">
            <h2>➕ Agregar Nuevo Gasto</h2>
            <div style="display:grid; grid-template-columns:1fr 1fr 2fr auto; gap:12px; align-items:end; margin-top:15px;">
                <div>
                    <label style="display:block; margin-bottom:6px; font-size:0.9em; color:#374151; font-weight:600;">ITEM</label>
                    <input type="text" id="gasto-item" placeholder="Ej: Insumos, Luz, Gas...">
                </div>
                <div>
                    <label style="display:block; margin-bottom:6px; font-size:0.9em; color:#374151; font-weight:600;">Total</label>
                    <input type="number" id="gasto-monto" placeholder="$" min="0" step="0.01">
                </div>
                <div>
                    <label style="display:block; margin-bottom:6px; font-size:0.9em; color:#374151; font-weight:600;">OBSERVACION</label>
                    <input type="text" id="gasto-obs" placeholder="Detalle del gasto...">
                </div>
                <button id="btn-agregar-gasto" style="background:#10b981; padding:10px 20px; font-weight:600;">✅ Agregar</button>
            </div>
        </div>

    </div>

    <script src="logic.js"></script>
    <script src="ui.js"></script>
    <script src="gastos.js"></script>
</body>
</html>

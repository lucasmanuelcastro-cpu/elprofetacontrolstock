<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>El Profeta - Control de Gastos</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        /* Estilos específicos para la página de gastos */
        .gastos-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }
        
        .finanzas-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin-top: 20px;
        }
        
        .card-resumen {
            background: white;
            padding: 20px;
            border-radius: 12px;
            border: 2px solid #e5e7eb;
        }
        
        .card-resumen h2 {
            font-size: 16px;
            color: #374151;
            margin-bottom: 15px;
        }
        
        .big-number {
            font-size: 28px;
            font-weight: bold;
            margin: 10px 0;
        }
        
        .text-green { color: #059669; }
        .text-blue { color: #2563eb; }
        .text-red { color: #dc2626; }
        
        .btn-historial {
            background: #7c3aed;
            color: white;
            padding: 6px 12px;
            border-radius: 8px;
            font-size: 0.85em;
            border: none;
            cursor: pointer;
        }
        
        .form-gasto {
            display: grid;
            grid-template-columns: 1fr 1fr 2fr auto;
            gap: 12px;
            align-items: end;
            margin-top: 15px;
        }
        
        .form-gasto label {
            display: block;
            margin-bottom: 6px;
            font-size: 0.9em;
            color: #374151;
            font-weight: 600;
        }
        
        .form-gasto input {
            width: 100%;
            padding: 10px;
            border: 1px solid #d1d5db;
            border-radius: 8px;
        }
        
        .btn-agregar {
            background: #10b981;
            color: white;
            padding: 10px 20px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-weight: 600;
        }
        
        @media (max-width: 900px) {
            .gastos-grid,
            .finanzas-grid {
                grid-template-columns: 1fr;
            }
            .form-gasto {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="app-container">
        
        <!-- HEADER CON BOTÓN VENTAS -->
        <header style="display:flex; justify-content:space-between; align-items:center; margin-bottom:24px;">
            <div>
                <h1 style="display:flex; align-items:center; gap:10px; margin:0;">
                    <img src="EP CARA.png" alt="El Profeta" style="height:1.2em; vertical-align:middle;">
                    El Profeta
                </h1>
                <p style="color:#6b7280; font-size:0.9em; margin:4px 0 0 0;">Control de Gastos</p>
            </div>
            <a href="index.html" style="background:#7c3aed; color:white; padding:10px 20px; border-radius:12px; text-decoration:none; font-weight:600;">📊 VENTAS</a>
        </header>

        <!-- STOCK GENERAL + TOTAL GASTADO / PUNTO EQUILIBRIO -->
        <div class="gastos-grid">
            <!-- STOCK GENERAL -->
            <section id="stock-general-section" class="card-section"></section>

            <!-- TOTAL GASTADO Y PUNTO DE EQUILIBRIO -->
            <div style="display:flex; flex-direction:column; gap:20px;">
                <div class="card-resumen">
                    <h2>TOTAL GASTADO</h2>
                    <p class="big-number text-red">$<span id="total-gastado">0</span></p>
                </div>
                <div class="card-resumen">
                    <h2>PUNTO DE EQUILIBRIO</h2>
                    <p style="color:#6b7280; font-size:0.95em; margin-top:10px;">(PARA EL PROFETA - TOTAL GASTADO)</p>
                    <p class="big-number text-blue" style="margin-top:10px;">$<span id="punto-equilibrio">0</span></p>
                </div>
            </div>
        </div>

        <!-- DINERO INGRESADO (EFECTIVO / TRANSFERENCIA / TOTAL / PROFETA) -->
        <section id="ventas-general-section" class="card-section"></section>

        <!-- HISTORIAL DE GASTOS -->
        <div class="card" style="border-left:4px solid #7c3aed; margin-top:20px;">
            <h2 style="margin:0 0 15px 0;">📋 Historial DE GASTOS</h2>
            <div id="historial-gastos-lista" style="max-height:300px; overflow-y:auto;">
                <p style="color:#6b7280; text-align:center; padding:20px;">No hay gastos registrados</p>
            </div>
        </div>

        <!-- FORMULARIO AGREGAR GASTO -->
        <div class="card" style="border-left:4px solid #10b981; margin-top:20px;">
            <h2 style="margin:0 0 15px 0;">➕ Agregar Nuevo Gasto</h2>
            <div class="form-gasto">
                <div>
                    <label>ITEM</label>
                    <input type="text" id="gasto-item" placeholder="Ej: Insumos, Luz, Gas...">
                </div>
                <div>
                    <label>Total</label>
                    <input type="number" id="gasto-monto" placeholder="$" min="0" step="0.01">
                </div>
                <div>
                    <label>OBSERVACION</label>
                    <input type="text" id="gasto-obs" placeholder="Detalle del gasto...">
                </div>
                <button id="btn-agregar-gasto" class="btn-agregar">✅ Agregar</button>
            </div>
        </div>

    </div>

    <script src="logic.js"></script>
    <script src="ui.js"></script>
    <script src="gastos.js"></script>
</body>
</html>

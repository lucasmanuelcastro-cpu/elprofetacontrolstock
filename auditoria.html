<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>El Profeta - Auditoría</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    .tag {
      padding: 2px 8px; border-radius: 6px; font-size: 0.8em; font-weight: 600;
    }
    .tag-venta    { background:#dcfce7; color:#166534; }
    .tag-cobro    { background:#dbeafe; color:#1e40af; }
    .tag-borrado  { background:#fee2e2; color:#991b1b; }
    .tag-stock    { background:#fef9c3; color:#92400e; }
    .tag-transfer { background:#ede9fe; color:#7c3aed; }
    .tag-otro     { background:#f3f4f6; color:#374151; }
  </style>
</head>
<body>
  <div class="app-container">
    <header style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
      <div>
        <h1><img src="EP CARA.png" alt="El Profeta" style="height:1em; vertical-align:middle;"> El Profeta</h1>
        <p style="color:#666; margin-top:4px;">Registro de Auditoría</p>
      </div>
      <a href="index.html" style="background:#7c3aed; color:white; padding:10px 20px; border-radius:8px; text-decoration:none; font-weight:bold;">📊 VENTAS</a>
    </header>

    <div class="card">
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:16px; flex-wrap:wrap; gap:10px;">
        <h2 style="margin:0;">🔍 Historial de Auditoría</h2>
        <div style="display:flex; gap:8px; flex-wrap:wrap;">
          <button id="btn-descargar" style="background:#059669;">⬇️ Descargar CSV</button>
          <button id="btn-borrar" style="background:#ef4444;">🗑️ Borrar Todo</button>
        </div>
      </div>

      <div style="margin-bottom:12px; display:flex; gap:8px; flex-wrap:wrap;">
        <input type="text" id="filtro-texto" placeholder="🔍 Buscar..." style="flex:1; min-width:150px;">
        <select id="filtro-accion" style="min-width:140px;">
          <option value="">Todas las acciones</option>
          <option value="VENTA">Ventas</option>
          <option value="COBRO">Cobros</option>
          <option value="BORRADO">Borrados</option>
          <option value="STOCK">Stock</option>
          <option value="TRANSFERENCIA">Transferencias</option>
        </select>
      </div>

      <div id="tabla-auditoria">
        <p style="color:#666; text-align:center; padding:20px;">Cargando...</p>
      </div>
    </div>
  </div>

  <script>
    const URL_SCRIPT = "https://script.google.com/macros/s/AKfycbzFaSL2UsVfYM1KHxQQE87S4nAjCmJTwTqelh8qxPqqNpxvMo6Md0a2_hPsrvvZrKHRxQ/exec";
    let registros = [];

    function tagClass(accion) {
      const a = String(accion).toUpperCase();
      if (a.includes("VENTA"))        return "tag-venta";
      if (a.includes("COBRO"))        return "tag-cobro";
      if (a.includes("BORRADO"))      return "tag-borrado";
      if (a.includes("STOCK"))        return "tag-stock";
      if (a.includes("TRANSFER"))     return "tag-transfer";
      return "tag-otro";
    }

    function renderTabla() {
      const cont = document.getElementById("tabla-auditoria");
      const texto = document.getElementById("filtro-texto").value.toLowerCase();
      const accion = document.getElementById("filtro-accion").value.toUpperCase();

      const filtrados = registros.filter(r => {
        const matchTexto = !texto ||
          String(r.usuario).toLowerCase().includes(texto) ||
          String(r.cliente).toLowerCase().includes(texto) ||
          String(r.detalle).toLowerCase().includes(texto);
        const matchAccion = !accion || String(r.accion).toUpperCase().includes(accion);
        return matchTexto && matchAccion;
      });

      if (filtrados.length === 0) {
        cont.innerHTML = '<p style="color:#666; text-align:center; padding:20px;">No hay registros.</p>';
        return;
      }

      cont.innerHTML = `
        <div style="overflow-x:auto;">
          <table style="width:100%; border-collapse:collapse; font-size:0.88em;">
            <thead>
              <tr style="border-bottom:2px solid #e5e7eb; text-align:left; background:#f8fafc;">
                <th style="padding:8px;">Fecha</th>
                <th style="padding:8px;">Acción</th>
                <th style="padding:8px;">Usuario</th>
                <th style="padding:8px;">Cliente</th>
                <th style="padding:8px;">Detalle</th>
                <th style="padding:8px; text-align:right;">Monto</th>
              </tr>
            </thead>
            <tbody>
              ${filtrados.map(r => `
                <tr style="border-bottom:1px solid #f3f4f6;">
                  <td style="padding:8px; color:#64748b; white-space:nowrap;">${r.fecha || ''}</td>
                  <td style="padding:8px;"><span class="tag ${tagClass(r.accion)}">${r.accion || ''}</span></td>
                  <td style="padding:8px;">${r.usuario || '—'}</td>
                  <td style="padding:8px;">${r.cliente || '—'}</td>
                  <td style="padding:8px; color:#374151;">${r.detalle || '—'}</td>
                  <td style="padding:8px; text-align:right; font-weight:600; color:${Number(r.monto) > 0 ? '#059669' : '#374151'};">
                    ${Number(r.monto) > 0 ? '$' + Number(r.monto).toLocaleString('es-AR') : '—'}
                  </td>
                </tr>`).join('')}
            </tbody>
          </table>
        </div>
        <div style="text-align:right; margin-top:8px; color:#64748b; font-size:0.85em;">
          ${filtrados.length} registro${filtrados.length !== 1 ? 's' : ''}
        </div>`;
    }

    async function cargar() {
      try {
        const res = await fetch(`${URL_SCRIPT}?accion=leerAuditoria&v=${Date.now()}`);
        const data = await res.json();
        registros = data.registros || [];
        renderTabla();
      } catch(e) {
        document.getElementById("tabla-auditoria").innerHTML =
          '<p style="color:#ef4444; text-align:center;">Error de conexión.</p>';
      }
    }

    document.getElementById("btn-descargar").addEventListener("click", () => {
      if (!registros.length) return alert("No hay registros para descargar.");
      const csv = ["FECHA,ACCION,USUARIO,CLIENTE,DETALLE,MONTO",
        ...registros.map(r => `"${r.fecha}","${r.accion}","${r.usuario}","${r.cliente}","${r.detalle}","${r.monto}"`)
      ].join("\n");
      const a = document.createElement("a");
      a.href = "data:text/csv;charset=utf-8,\uFEFF" + encodeURIComponent(csv);
      a.download = "auditoria_elprofeta.csv";
      a.click();
    });

    document.getElementById("btn-borrar").addEventListener("click", async () => {
      if (!confirm("⚠️ ¿Borrar TODO el historial de auditoría? Esta acción no se puede deshacer.")) return;
      try {
        await fetch(URL_SCRIPT, {
          method: "POST",
          body: JSON.stringify({ accion: "borrarAuditoria" }),
          headers: { "Content-Type": "text/plain" },
          mode: "cors"
        });
        registros = [];
        renderTabla();
        alert("✅ Auditoría borrada.");
      } catch(e) {
        alert("Error al borrar.");
      }
    });

    document.getElementById("filtro-texto").addEventListener("input", renderTabla);
    document.getElementById("filtro-accion").addEventListener("change", renderTabla);

    cargar();
  </script>
</body>
</html>
